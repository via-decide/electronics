name: ci
on:
  push:
  pull_request:
  schedule:
    - cron: '17 3 * * 0'
jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11.9'}
      - run: python -m pip install -r requirements.lock
      - run: ./tools/verify.sh --profile ci --clean --emit-manifest artifacts/build-manifest.json
      - if: github.event_name == 'schedule'
        run: make ssd-sim-verify SSD_SIM_SEED=10000000
